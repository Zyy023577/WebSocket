<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>WebSocket 聊天</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div id="app">
    <div id="login">
      <input id="username" placeholder="输入用户名" />
      <button id="joinBtn">进入聊天室</button>
      <div id="loginError" class="error"></div>
    </div>

    <div id="chat" class="hidden">
      <aside id="sidebar">
        <h3>在线用户</h3>
        <ul id="users"></ul>
      </aside>

      <main id="main">
        <div id="messages"></div>

        <form id="sendForm">
          <input id="messageInput" autocomplete="off" placeholder="输入消息..." />
          <button type="submit">发送</button>
        </form>
      </main>
    </div>
  </div>

  <script src="/main.js"></script>
</body>
</html>
